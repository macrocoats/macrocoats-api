---
# Codifies the OCI network rules that took a full debugging session to get right
# (see git history around 2026-07-21/22): both the subnet's Security List AND any
# NSG attached to the instance's VNIC must independently allow 22/80/443 — OCI
# enforces all applicable rule sets together, not as alternatives. This role runs
# against localhost (these are OCI control-plane API calls, not SSH into the box)
# and requires the OCI CLI config at ~/.oci/config plus the oracle.oci collection
# (`ansible-galaxy collection install oracle.oci`) with its Python SDK
# (`pip install oci` into Ansible's own Python interpreter).
#
# NOT a full disaster-recovery solution: this updates rules on an EXISTING
# Security List / NSG (their OCIDs are hardcoded below). It does not create a new
# VCN, subnet, or NSG from scratch — rebuilding the instance itself still needs
# that done manually (or a separate Terraform/OCI CLI step) before this applies.

- name: Ensure Default Security List allows SSH/HTTP/HTTPS
  oracle.oci.oci_network_security_list:
    security_list_id: "{{ oci_security_list_id }}"
    purge_security_rules: true
    ingress_security_rules:
      - protocol: "6" # TCP
        source: "0.0.0.0/0"
        source_type: CIDR_BLOCK
        is_stateless: false
        tcp_options:
          destination_port_range:
            min: 22
            max: 22
      - protocol: "6"
        source: "0.0.0.0/0"
        source_type: CIDR_BLOCK
        is_stateless: false
        tcp_options:
          destination_port_range:
            min: 80
            max: 80
      - protocol: "6"
        source: "0.0.0.0/0"
        source_type: CIDR_BLOCK
        is_stateless: false
        tcp_options:
          destination_port_range:
            min: 443
            max: 443
      - protocol: "1" # ICMP
        source: "0.0.0.0/0"
        source_type: CIDR_BLOCK
        is_stateless: false
        icmp_options:
          type: 3
          code: 4
      - protocol: "1"
        source: "10.0.0.0/16"
        source_type: CIDR_BLOCK
        is_stateless: false
        icmp_options:
          type: 3
    egress_security_rules:
      - protocol: all
        destination: "0.0.0.0/0"
        destination_type: CIDR_BLOCK
        is_stateless: false

- name: Fetch current NSG rules
  oracle.oci.oci_network_security_group_security_rule_facts:
    network_security_group_id: "{{ oci_nsg_id }}"
    direction: INGRESS
  register: nsg_rules

- name: Determine which of 22/80/443 are missing from the NSG
  ansible.builtin.set_fact:
    nsg_present_ports: "{{ nsg_rules.network_security_group_security_rules
      | selectattr('tcp_options', 'defined')
      | selectattr('tcp_options', 'ne', None)
      | map(attribute='tcp_options.destination_port_range.min')
      | list }}"

- name: Add missing NSG ingress rules for 22/80/443
  oracle.oci.oci_network_security_group_security_rule_actions:
    network_security_group_id: "{{ oci_nsg_id }}"
    action: add
    security_rules:
      - direction: INGRESS
        protocol: "6"
        source: "0.0.0.0/0"
        source_type: CIDR_BLOCK
        is_stateless: false
        tcp_options:
          destination_port_range:
            min: "{{ item }}"
            max: "{{ item }}"
  loop: [22, 80, 443]
  when: item not in (nsg_present_ports | map('int') | list)
